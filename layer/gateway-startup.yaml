# METABEGIN
# X-Env-Layer-Name: gateway-startup
# X-Env-Layer-Category: gateway
# X-Env-Layer-Desc: Zero Axis gateway bootstrap service and first-boot path setup
# X-Env-Layer-Requires: gateway-base
# METAEND
---
mmdebstrap:
  customize-hooks:
    - |-
      set -eu
      install -d -m 0755 $1/opt/gateway
      install -d -m 0755 $1/opt/gateway/software_storage/AES
      install -d -m 0755 $1/opt/gateway/software_storage/PES
      install -d -m 0755 $1/opt/gateway/scripts
      install -d -m 0755 $1/opt/gateway/system_related/startup
      install -D -m 0755 $SRCROOT/system_related/startup/gateway-grow-rootfs.sh $1/opt/gateway/scripts/gateway-grow-rootfs.sh
      install -D -m 0644 $SRCROOT/system_related/startup/gateway-grow-rootfs.service $1/etc/systemd/system/gateway-grow-rootfs.service
      install -D -m 0755 $SRCROOT/system_related/startup/gateway-startup.sh $1/opt/gateway/scripts/gateway-startup.sh
      install -D -m 0644 $SRCROOT/system_related/startup/gateway-startup.service $1/etc/systemd/system/gateway-startup.service
    - $BDEBSTRAP_HOOKS/enable-units "$1" gateway-grow-rootfs gateway-startup
